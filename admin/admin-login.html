<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - JDI KOSKITA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        /* ============================================================
           RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0A2E6D 0%, #1a4a8a 50%, #FF7A00 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Floating shapes background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 10% 20%, rgba(255, 122, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(10, 46, 109, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .logo-icon {
            width: 72px;
            height: 72px;
            background: #0A2E6D;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 32px;
            color: #fff;
            box-shadow: 0 8px 30px rgba(10, 46, 109, 0.3);
        }

        .login-logo h1 {
            font-size: 24px;
            color: #0A2E6D;
        }

        .login-logo h1 span {
            color: #FF7A00;
        }

        .login-logo p {
            font-size: 14px;
            color: #888;
            margin-top: 2px;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form .form-group label {
            display: block;
            font-weight: 600;
            color: #0A2E6D;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .login-form .form-group label .required {
            color: #dc3545;
        }

        .login-form .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9edf2;
            border-radius: 12px;
            font-size: 15px;
            transition: 0.3s;
            background: #fafcff;
        }

        .login-form .form-group input:focus {
            outline: none;
            border-color: #FF7A00;
            box-shadow: 0 0 0 4px rgba(255, 122, 0, 0.1);
            background: #fff;
        }

        .login-form .form-group .input-icon {
            position: relative;
        }

        .login-form .form-group .input-icon .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0.5;
        }

        .login-form .form-group .input-icon input {
            padding-left: 44px;
        }

        .login-form .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 0 24px;
            font-size: 14px;
        }

        .login-form .form-options .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            cursor: pointer;
        }

        .login-form .form-options .remember input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #FF7A00;
            cursor: pointer;
        }

        .login-form .form-options .forgot {
            color: #FF7A00;
            text-decoration: none;
            font-weight: 600;
        }

        .login-form .form-options .forgot:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF7A00, #e06a00);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 30px rgba(255, 122, 0, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(255, 122, 0, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .login-error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
            border: 1px solid #f5c6cb;
        }

        .login-error.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-8px);
            }
            75% {
                transform: translateX(8px);
            }
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #888;
        }

        .login-footer a {
            color: #FF7A00;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* Security badge */
        .security-badge {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
            font-size: 12px;
            color: #999;
        }

        .security-badge span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Overlay ditampilkan saat mengecek status login sebelumnya,
           supaya form tidak "berkedip" muncul sebelum redirect */
        #checkingOverlay {
            position: fixed;
            inset: 0;
            background: #0A2E6D;
            z-index: 100000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            color: #fff;
        }
        #checkingOverlay .spinner {
            width: 38px;
            height: 38px;
            border: 4px solid rgba(255,255,255,0.25);
            border-top-color: #FF7A00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 28px 20px;
            }

            .login-logo h1 {
                font-size: 20px;
            }

            .login-form .form-options {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .btn-login {
                padding: 12px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Overlay pemeriksaan sesi awal -->
    <div id="checkingOverlay">
        <div class="spinner"></div>
        <p>Memeriksa status login...</p>
    </div>

    <div class="login-container">
        <!-- Logo -->
        <div class="login-logo">
            <div class="logo-icon">🏠</div>
            <h1>JDI <span>KOSKITA</span></h1>
            <p>Admin Panel • Smart Boarding House Management</p>
        </div>

        <!-- Error Message -->
        <div class="login-error" id="loginError">
            ⚠️ Username atau password salah. Silakan coba lagi.
        </div>

        <!-- Login Form -->
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <div class="input-icon">
                    <span class="icon">👤</span>
                    <input type="email" id="username" placeholder="Masukkan email" required autocomplete="username" />
                </div>
            </div>

            <div class="form-group">
                <label>Password <span class="required">*</span></label>
                <div class="input-icon">
                    <span class="icon">🔒</span>
                    <input type="password" id="password" placeholder="Masukkan password" required autocomplete="current-password" />
                </div>
            </div>

            <div class="form-options">
                <label class="remember">
                    <input type="checkbox" id="rememberMe" checked /> Ingat saya
                </label>
                <a href="#" class="forgot">Lupa Password?</a>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span id="loginText">🔑 Masuk Dashboard</span>
                <span id="loginLoading" style="display:none;">⏳ Memproses...</span>
            </button>
        </form>

        <div class="security-badge">
            <span>🔒 SSL Secure</span>
            <span>🛡️ Protected</span>
            <span>⚡ 256-bit Encryption</span>
        </div>

        <div class="login-footer">
            Kembali ke <a href="../website/index.html">Beranda</a> &bull; v3.0
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const loginForm = document.getElementById('loginForm');
            const username = document.getElementById('username');
            const password = document.getElementById('password');
            const rememberMe = document.getElementById('rememberMe');
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const loginLoading = document.getElementById('loginLoading');
            const loginError = document.getElementById('loginError');
            const checkingOverlay = document.getElementById('checkingOverlay');

            var isSubmitting = false;      // cegah submit dobel / race redirect
            var initialCheckDone = false;  // sudah tahu status auth awal?

            // ============================================
            // FIREBASE AUTH
            // ============================================
            var firebaseConfig = {
                apiKey: "AIzaSyBBjQbXnnOxc4MkO8bg4iiTIl7FoEoiers",
                authDomain: "jdi-koskita.firebaseapp.com",
                projectId: "jdi-koskita",
                storageBucket: "jdi-koskita.firebasestorage.app",
                messagingSenderId: "280684880955",
                appId: "1:280684880955:web:6199875974b69bfc89681e",
                measurementId: "G-RPFK3BB1CQ"
            };
            firebase.initializeApp(firebaseConfig);
            var auth = firebase.auth();

            function goToDashboard() {
                if (isSubmitting) return; // hindari redirect ganda
                isSubmitting = true;
                window.location.href = 'admin-dashboard.html';
            }

            function hideCheckingOverlay() {
                if (checkingOverlay) checkingOverlay.style.display = 'none';
            }

            // Satu-satunya sumber kebenaran untuk redirect: onAuthStateChanged.
            // Form submit TIDAK lagi melakukan redirect sendiri via setTimeout,
            // supaya tidak terjadi race antara dua jalur redirect berbeda
            // (ini penyebab "redirect setelah login pernah gagal").
            auth.onAuthStateChanged(function(user) {
                initialCheckDone = true;
                if (user) {
                    goToDashboard();
                } else {
                    hideCheckingOverlay();
                }
            });

            // Jaga-jaga: kalau Firebase lambat/gagal menentukan status auth
            // (mis. koneksi lambat), jangan biarkan overlay nyangkut selamanya.
            setTimeout(function() {
                if (!initialCheckDone) hideCheckingOverlay();
            }, 4000);

            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                if (isSubmitting) return;

                const email = username.value.trim();
                const pass = password.value.trim();

                if (!email || !pass) {
                    showError('Email dan password wajib diisi!');
                    return;
                }

                loginText.style.display = 'none';
                loginLoading.style.display = 'inline';
                loginBtn.disabled = true;

                // "Ingat saya" dicentang -> sesi bertahan walau browser ditutup (LOCAL).
                // Tidak dicentang -> sesi hanya untuk tab ini, hilang saat tab ditutup (SESSION).
                // Sebelumnya checkbox ini ada di form tapi tidak berpengaruh sama sekali.
                var persistence = rememberMe.checked
                    ? firebase.auth.Auth.Persistence.LOCAL
                    : firebase.auth.Auth.Persistence.SESSION;

                auth.setPersistence(persistence)
                    .then(function() {
                        return auth.signInWithEmailAndPassword(email, pass);
                    })
                    .then(function(userCredential) {
                        sessionStorage.setItem('admin_username', userCredential.user.email);
                        sessionStorage.setItem('admin_login_time', new Date().toISOString());
                        sessionStorage.setItem('admin_last_activity', Date.now().toString());
                        // Redirect dilakukan oleh onAuthStateChanged di atas begitu
                        // Firebase mengkonfirmasi state berubah, bukan di sini,
                        // supaya hanya ada satu jalur redirect yang aktif.
                    })
                    .catch(function(error) {
                        loginText.style.display = 'inline';
                        loginLoading.style.display = 'none';
                        loginBtn.disabled = false;

                        var pesan = '⚠️ Email atau password salah. Silakan coba lagi.';
                        if (error.code === 'auth/too-many-requests') {
                            pesan = '⚠️ Terlalu banyak percobaan gagal. Coba lagi beberapa saat lagi.';
                        } else if (error.code === 'auth/user-disabled') {
                            pesan = '⚠️ Akun ini telah dinonaktifkan.';
                        } else if (error.code === 'auth/network-request-failed') {
                            pesan = '⚠️ Koneksi bermasalah. Periksa jaringan internet Anda.';
                        }
                        showError(pesan);
                        document.querySelector('.login-container').style.animation = 'shake 0.4s ease';
                        setTimeout(function() {
                            document.querySelector('.login-container').style.animation = 'slideUp 0.6s ease';
                        }, 500);
                    });
            });

            function showError(message) {
                loginError.textContent = message;
                loginError.classList.add('show');
                setTimeout(function() {
                    loginError.classList.remove('show');
                }, 5000);
            }

            // Enter key submit — hanya trigger submit form, tanpa dispatch
            // event submit tambahan yang bisa membuat percobaan login dobel.
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && document.activeElement &&
                    (document.activeElement === username || document.activeElement === password)) {
                    loginForm.requestSubmit ? loginForm.requestSubmit() : loginForm.dispatchEvent(new Event('submit', { cancelable: true }));
                }
            });

            console.log('🔐 Admin Login Page Loaded (Firebase Authentication)');

        })();
    </script>

</body>
</html>
